/* ═══════════════════════ TOAST SYSTEM ═══════════════════════ */
const ToastCtx = createContext({ addToast: () => {} });
let _toastId = 0;
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = "error", duration = 4500) => {
    const id = ++_toastId;
    setToasts(prev => [...prev.slice(-4), { id, message, type, leaving: false }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 250);
    }, duration);
  }, []);
  return React.createElement(ToastCtx.Provider, { value: { addToast } },
    children,
    React.createElement("div", { className: "fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none", style: { maxWidth: "360px" } },
      toasts.map(t => React.createElement("div", {
        key: t.id,
        className: `pointer-events-auto px-4 py-3 rounded-xl border text-sm font-medium shadow-xl backdrop-blur-lg ${
          t.leaving ? "toast-out" : "toast-in"
        } ${
          t.type === "error" ? "bg-red-900/80 border-red-700/60 text-red-200" :
          t.type === "warn"  ? "bg-amber-900/80 border-amber-700/60 text-amber-200" :
                                "bg-emerald-900/80 border-emerald-700/60 text-emerald-200"
        }`
      }, t.type === "error" ? "⚠ " : t.type === "warn" ? "⚡ " : "✓ ", t.message))
    )
  );
}

/* ═══════════════════════ HELPERS ═══════════════════════ */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function stripAccents(s) {
  return s.replace(/ñ/g, "n").replace(/Ñ/g, "N")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function diffIsAccentsOnly(input, correct) {
  return stripAccents(input.toLowerCase()) === stripAccents(correct.toLowerCase())
    && input.toLowerCase() !== correct.toLowerCase();
}

/* ═══════════════════════ AUTH CONTEXT ═══════════════════════ */
const AuthCtx = createContext({ user: null, loading: true });

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  return React.createElement(AuthCtx.Provider, { value: { user, loading } }, children);
}

/* ═══════════════════════ PROGRESS HOOK — Supabase ═══════════════════════
   Loads user_progress from Supabase on mount (or fallback to localStorage
   for guest mode). Upserts after every answer.
   ═══════════════════════════════════════════════════════════════════════ */
function useProgress(user) {
  // Scope localStorage key per user — guest mode uses a shared key
  const LOCAL_KEY = user ? `uga_sp2001_v4_${user.id}` : "uga_sp2001_v4_guest";
  const { addToast } = useContext(ToastCtx);

  const blankWs = () => {
    const o = {};
    VOCAB.forEach(w => { o[w.id] = { level: 0, misses: 0 }; });
    return o;
  };

  // ws = { [vocab_item_id]: { level: 0-3, misses: 0 } }
  // Always start blank — data is loaded in effects below
  const [ws, setWs] = useState(blankWs);

  const [loaded, setLoaded] = useState(false);
  const pendingRef = useRef([]);
  const wsRef = useRef(ws); // mirror state to avoid side-effects inside setState
  useEffect(() => { wsRef.current = ws; }, [ws]);

  // Warn if user tries to close tab with unsaved progress
  useEffect(() => {
    const handler = (e) => {
      if (pendingRef.current.length > 0) { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, []);

  // Load from Supabase when user logs in; always reset to blank first so
  // a new account never inherits a previous account's cached data.
  useEffect(() => {
    if (!user) {
      // Guest: restore from guest-scoped localStorage
      try {
        const d = JSON.parse(localStorage.getItem(LOCAL_KEY));
        if (d?.v === 4 && d.ws) setWs(d.ws);
      } catch {}
      setLoaded(true);
      return;
    }
    // Logged-in: reset to blank, then load from Supabase
    setWs(blankWs());
    setLoaded(false);
    (async () => {
      try {
        const { data, error } = await supabase
          .from("user_progress")
          .select("vocab_item_id, mastery_level, misses")
          .eq("user_id", user.id);
        if (error) throw error;
        if (data && data.length > 0) {
          setWs(prev => {
            const next = { ...prev };
            data.forEach(r => {
              next[r.vocab_item_id] = { level: r.mastery_level, misses: r.misses };
            });
            return next;
          });
        }
      } catch (err) {
        console.error("Failed to load progress:", err);
        // Try user-scoped localStorage as fallback
        try {
          const d = JSON.parse(localStorage.getItem(LOCAL_KEY));
          if (d?.v === 4 && d.ws) setWs(d.ws);
        } catch {}
        addToast("Could not load cloud progress. Using local backup.", "warn");
      }
      setLoaded(true);
    })();
  }, [user?.id]);

  // Persist to localStorage on every change (instant backup / guest mode)
  useEffect(() => {
    localStorage.setItem(LOCAL_KEY, JSON.stringify({ v: 4, ws }));
  }, [ws]);

  // Online/offline detection
  const [online, setOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);
  useEffect(() => {
    const on  = () => { setOnline(true);  addToast("Back online — syncing progress.", "success"); flushToSupabase(); };
    const off = () => { setOnline(false); addToast("You're offline. Progress is saved locally and will sync when reconnected.", "warn", 6000); };
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  // Debounced flush to Supabase (batches upserts every 600ms) — with error handling
  const flushTimer = useRef(null);
  const retryCount = useRef(0);
  const flushToSupabase = useCallback(async () => {
    if (!user || pendingRef.current.length === 0) return;
    const batch = [...pendingRef.current];
    pendingRef.current = [];
    const rows = batch.map(({ id, level, misses }) => ({
      user_id: user.id,
      vocab_item_id: id,
      mastery_level: level,
      misses: misses,
      last_reviewed: new Date().toISOString(),
    }));
    try {
      const { error } = await supabase.from("user_progress").upsert(rows, { onConflict: "user_id,vocab_item_id" });
      if (error) throw error;
      retryCount.current = 0;
    } catch (err) {
      console.error("Progress save failed:", err);
      // Put the batch back for retry
      pendingRef.current = [...batch, ...pendingRef.current];
      retryCount.current++;
      if (retryCount.current <= 3) {
        // Exponential backoff retry
        const delay = Math.min(1000 * Math.pow(2, retryCount.current), 8000);
        flushTimer.current = setTimeout(flushToSupabase, delay);
      } else {
        addToast("Progress save failed after retries. Your progress is safe locally and will sync later.", "error", 6000);
        retryCount.current = 0;
      }
    }
  }, [user]);

  const enqueueUpsert = useCallback((vocabId, level, misses) => {
    pendingRef.current.push({ id: vocabId, level, misses });
    clearTimeout(flushTimer.current);
    flushTimer.current = setTimeout(flushToSupabase, 600);
  }, [flushToSupabase]);

  // FIX: Update state optimistically, then read from ref for upsert (no side-effect inside setState)
  const upd = useCallback((id, patch) => {
    setWs(prev => {
      const cur = prev[id] || { level: 0, misses: 0 };
      const next = { ...cur, ...patch };
      return { ...prev, [id]: next };
    });
    // Read latest merged state from the ref after React commits
    setTimeout(() => {
      const cur = wsRef.current[id];
      if (cur) enqueueUpsert(id, cur.level, cur.misses);
    }, 0);
  }, [enqueueUpsert]);

  const resetAll = useCallback(async () => {
    const o = {};
    VOCAB.forEach(w => { o[w.id] = { level: 0, misses: 0 }; });
    setWs(o);
    if (user) {
      try {
        const { error } = await supabase.from("user_progress").delete().eq("user_id", user.id);
        if (error) throw error;
        addToast("All progress reset.", "success");
      } catch (err) {
        console.error("Reset failed:", err);
        addToast("Reset failed on the server — local progress was cleared.", "error");
      }
    }
  }, [user]);

  const resetCats = useCallback(async (catSet) => {
    const ids = VOCAB.filter(w => catSet.has(w.cat)).map(w => w.id);
    if (ids.length === 0) return;
    setWs(prev => {
      const next = { ...prev };
      ids.forEach(id => { next[id] = { level: 0, misses: 0 }; });
      return next;
    });
    if (user) {
      try {
        const { error } = await supabase.from("user_progress").delete()
          .eq("user_id", user.id).in("vocab_item_id", ids);
        if (error) throw error;
        addToast(`Progress reset for ${catSet.size} categor${catSet.size === 1 ? "y" : "ies"} (${ids.length} words).`, "success");
      } catch (err) {
        console.error("Reset failed:", err);
        addToast("Reset failed on the server — local progress was cleared.", "error");
      }
    }
  }, [user]);

  // Flush remaining progress when tab is closing
  useEffect(() => {
    const handler = () => {
      if (user && pendingRef.current.length > 0) {
        const rows = pendingRef.current.map(({ id, level, misses }) => ({
          user_id: user.id, vocab_item_id: id, mastery_level: level, misses, last_reviewed: new Date().toISOString(),
        }));
        // navigator.sendBeacon for reliable last-chance save
        const url = `${SUPABASE_URL}/rest/v1/user_progress`;
        const blob = new Blob([JSON.stringify(rows)], { type: "application/json" });
        try {
          const headers = { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${supabase.auth?.session?.()?.access_token || SUPABASE_ANON}`,
            "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" };
          // Fallback: at minimum, localStorage is already saved
          navigator.sendBeacon?.(url, blob);
        } catch {}
      }
    };
    window.addEventListener("pagehide", handler);
    return () => window.removeEventListener("pagehide", handler);
  }, [user]);

  return { ws, upd, resetAll, resetCats, loaded };
}

        </div>

        <form onSubmit={submit} className="space-y-3">
          {mode === "signup" && (
            <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="Username (optional)"
              className="w-full px-4 py-3 rounded-xl bg-white/[.04] border border-white/[.06] text-white text-sm outline-none focus:border-uga-red/50 transition" />
          )}
          <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="Email"
            className="w-full px-4 py-3 rounded-xl bg-white/[.04] border border-white/[.06] text-white text-sm outline-none focus:border-uga-red/50 transition" />
          <input type="password" required minLength={6} value={password} onChange={e => setPassword(e.target.value)} placeholder="Password (min 6 chars)"
            className="w-full px-4 py-3 rounded-xl bg-white/[.04] border border-white/[.06] text-white text-sm outline-none focus:border-uga-red/50 transition" />

          {error && (
            <div className="px-3 py-2 rounded-lg bg-red-900/30 border border-red-800/40 text-red-300 text-xs anim-fade-in">{error}</div>
          )}

          <button type="submit" disabled={loading}
            className="w-full py-3 rounded-xl bg-uga-red text-white font-bold text-sm hover:bg-uga-red-dark transition disabled:opacity-40">
            {loading ? "..." : mode === "signup" ? "Create Account" : "Log In"}
          </button>
        </form>

        <p className="text-center text-white/15 text-[10px] mt-6">Progress is saved to the cloud when logged in</p>
      </div>
    </div>
  );
}

function App() {

  const [cats, setCats] = useState(new Set(CATEGORIES));
  const { ws, upd, resetAll, resetCats, loaded: progressLoaded } = useProgress(user);

  // Show auth page if not logged in
  if (authLoading) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="w-8 h-8 border-2 border-uga-red border-t-transparent rounded-full anim-spin" />
      </div>
    );
  }

  if (!user) return <AuthPage />;

  if (!progressLoaded) {
    return (
      <div className="min-h-screen flex items-center justify-center flex-col gap-3">
        <div className="w-8 h-8 border-2 border-uga-red border-t-transparent rounded-full anim-spin" />
        <p className="text-white/30 text-xs">Loading your progress...</p>
      </div>
    );
  }

  const toggle = c => setCats(p => { const n = new Set(p); n.has(c) ? n.delete(c) : n.add(c); return n; });

  const stats = (() => {
    let notStarted = 0, learning = 0, mastered = 0;
    VOCAB.forEach(w => {
      if (!cats.has(w.cat)) return;
      const l = ws[w.id]?.level ?? 0;
      if (l === 0) notStarted++;
      else if (l < 3) learning++;
      else mastered++;
    });
    return { notStarted, learning, mastered, total: notStarted + learning + mastered };
  })();

  const { addToast } = useContext(ToastCtx);

  const signOut = async () => {
    try {
      const { error } = await supabase.auth.signOut();
      if (error) throw error;
    } catch (err) {
      addToast("Sign out failed: " + (err.message || "Unknown error"), "error");
    }
  };

  return (
    <div className="min-h-screen flex flex-col">
      {/* NAV */}
      <nav className="sticky top-0 z-50 bg-[#050507]/80 backdrop-blur-lg border-b border-white/[.06]">

          </div>
          <div className="flex bg-white/[.04] rounded-xl p-0.5 border border-white/[.06]">
            {[["home","Home"],["learn","Learn"],["browse","Browse"]].map(([id,lbl]) => (
              <button key={id} onClick={() => setView(id)}
                className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                  view === id ? "bg-uga-red text-white shadow-lg shadow-uga-red/20" : "text-white/40 hover:text-white/70"
                }`}>{lbl}</button>
            ))}
          </div>
          <div className="flex items-center gap-3">
            <span className="text-[10px] text-white/25 hidden sm:inline">{user.email}</span>
            <button onClick={signOut} className="text-[10px] text-white/30 hover:text-uga-red transition font-semibold">Sign Out</button>
          </div>
        </div>
      </nav>

      {/* BODY */}
      <div className="flex-1 flex">
        {view === "home" && <HomePage stats={stats} cats={cats} toggle={toggle} setCats={setCats} setView={setView} resetAll={resetAll} resetCats={resetCats} ws={ws} />}
        {view === "learn" && <LearningEngine cats={cats} ws={ws} upd={upd} setView={setView} />}

  );
}

/* ══════════════════════════════════════════════════════════════════
   ███  LEARNING ENGINE  ███
   ══════════════════════════════════════════════════════════════════
   MASTERY PIPELINE:
     Level 0 (New)      → Multiple Choice (Spanish term → pick English)
     Level 1 (Familiar) → Type the Answer  (English def → type Spanish)
     Level 3 (Mastered) → Removed from pool
   STUDY GAP: Level 1 words served BEFORE Level 0 words.
   CORRECTION MODE: Must retype correct answer after a miss.
   PENALTY: Miss Type → drops to Level 0.
   ══════════════════════════════════════════════════════════════════ */
function LearningEngine({ cats, ws, upd, setView }) {
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [round, setRound] = useState(1);
  const [sessionCorrect, setSessionCorrect] = useState(0);
  const [sessionWrong, setSessionWrong] = useState(0);

  // Final Quiz mode: activated when all words are mastered
  // fq = null (inactive) | { queue, idx, correct, wrong }
  const [fq, setFq] = useState(null);
  const startFinalQuiz = useCallback(() => {
    const all = shuffle(VOCAB.filter(w => cats.has(w.cat)));
    setFq({ queue: all, idx: 0, correct: 0, wrong: 0 });
  }, [cats]);
  const fqAdvance = useCallback(() => {
    setFq(prev => {
      if (!prev) return null;
      return { ...prev, idx: prev.idx + 1 };
    });
  }, []);
  const fqCorrect = useCallback(() => setFq(prev => prev ? { ...prev, correct: prev.correct + 1 } : null), []);
  const fqWrong   = useCallback(() => setFq(prev => prev ? { ...prev, wrong:  prev.wrong  + 1 } : null), []);

  const buildQueue = useCallback((currentWs) => {
    const w = currentWs || ws;
    const eligible = VOCAB.filter(v => cats.has(v.cat) && (w[v.id]?.level ?? 0) < 3);
    // Study Gap: Level 1 first, then Level 0
    const l1 = shuffle(eligible.filter(v => (w[v.id]?.level ?? 0) === 1));
    const l0 = shuffle(eligible.filter(v => (w[v.id]?.level ?? 0) === 0));
    return [...l1, ...l0];
  }, [cats, ws]);

  useEffect(() => {
    const q = buildQueue();
    setQueue(q);
    setIdx(0);
    setRound(1);
    setSessionCorrect(0);
    setSessionWrong(0);
  }, [cats]);

  const current = queue[idx];
  const currentLevel = current ? (ws[current.id]?.level ?? 0) : 0;

  const advance = useCallback(() => {
    if (idx + 1 < queue.length) {
      setIdx(i => i + 1);
    } else {
      const q = buildQueue(ws);
      if (q.length === 0) {
        setQueue([]);
        setIdx(0);
      } else {
        setQueue(q);
        setIdx(0);
        setRound(r => r + 1);
      }
    }
  }, [idx, queue.length, buildQueue, ws]);

  const handleCorrect = useCallback((id) => {
    const lvl = ws[id]?.level ?? 0;
    if (lvl === 0) upd(id, { level: 1 });
    else if (lvl === 1) upd(id, { level: 3 });
    setSessionCorrect(c => c + 1);
  }, [ws, upd]);

  const handleWrong = useCallback((id) => {
    const lvl = ws[id]?.level ?? 0;
    if (lvl === 1) upd(id, { level: 0, misses: (ws[id]?.misses ?? 0) + 1 });
    else upd(id, { misses: (ws[id]?.misses ?? 0) + 1 });
    setSessionWrong(c => c + 1);
    if (current) {
      setQueue(prev => {
        const copy = [...prev];
        const insertAt = Math.min(idx + 3 + Math.floor(Math.random() * 3), copy.length);
        copy.splice(insertAt, 0, current);
        return copy;
      });
    }
  }, [ws, upd, idx, current]);

  const sideStats = useMemo(() => {
    const active = VOCAB.filter(w => cats.has(w.cat));
    let ns = 0, lr = 0, ma = 0;
    active.forEach(w => {
      const l = ws[w.id]?.level ?? 0;
      if (l === 0) ns++;
      else if (l < 3) lr++;
      else ma++;
    });
    return { total: active.length, ns, lr, ma };
  }, [ws, cats]);

  /* ── Final Quiz render ── */
  if (fq) {
    const fqWord = fq.queue[fq.idx];
    const fqDone = fq.idx >= fq.queue.length;
    const total  = fq.queue.length;
    const pct    = fqDone ? Math.round(fq.correct / total * 100) : 0;

    if (fqDone) {
      return (
        <div className="flex-1 flex items-center justify-center p-4">
          <div className="text-center anim-scale-in max-w-md">
            <div className="text-7xl mb-4">{pct >= 80 ? "🏆" : pct >= 50 ? "📝" : "💪"}</div>
            <h2 className="text-2xl font-black text-white mb-1">Final Quiz Complete!</h2>
            <p className="text-white/40 text-sm mb-5">You scored {fq.correct}/{total} — {pct}%</p>
            <div className="flex gap-4 justify-center mb-3">
              <span className="text-emerald-400 font-bold text-sm">{fq.correct} correct</span>
              <span className="text-red-400 font-bold text-sm">{fq.wrong} missed</span>
            </div>
            <div className="h-3 rounded-full bg-white/[.05] overflow-hidden mb-6">
              <div className="h-full rounded-full bg-emerald-500 bar-fill" style={{ width: `${pct}%` }} />
            </div>
            <div className="flex justify-center gap-3">
              <button onClick={startFinalQuiz} className="px-6 py-3 bg-uga-red text-white font-bold rounded-xl hover:bg-uga-red-dark transition">Retake Quiz</button>
              <button onClick={() => { setFq(null); setView("home"); }} className="px-6 py-3 bg-white/[.08] border border-white/[.12] text-white font-bold rounded-xl hover:bg-white/[.14] transition">&larr; Home</button>
            </div>
          </div>
        </div>
      );
    }

    const fqCatStyle = CAT_STYLES[fqWord.cat] || CAT_STYLES["Society"];
    return (
      <div className="flex-1 flex flex-col items-center justify-center p-4 sm:p-8">
        <div className="w-full max-w-xl mb-4 flex items-center justify-between">
          <button onClick={() => { setFq(null); setView("home"); }} className="text-xs text-white/30 hover:text-white/50">&larr; Exit</button>
          <span className="text-xs font-bold text-uga-red uppercase tracking-widest">Final Quiz</span>
          <div className="flex gap-3 text-[11px]">
            <span className="text-emerald-400 font-bold">{fq.correct} ✓</span>
            <span className="text-red-400 font-bold">{fq.wrong} ✗</span>
          </div>
        </div>
        <div className="w-full max-w-xl mb-4 flex items-center gap-3">
          <div className="flex-1 h-1.5 rounded-full bg-white/[.06] overflow-hidden">
            <div className="h-full rounded-full bg-uga-red bar-fill" style={{ width: `${(fq.idx + 1) / total * 100}%` }} />
          </div>
          <span className="text-[10px] text-white/25 font-mono shrink-0">{fq.idx + 1}/{total}</span>
        </div>
        <div className="mb-5 flex items-center gap-2">
          <span className="text-[10px] font-bold px-2.5 py-0.5 rounded-full border bg-uga-red/20 text-uga-red border-uga-red/40">Final Quiz · Type the Answer</span>
          <span className={`text-[10px] px-2 py-0.5 rounded-full border ${fqCatStyle.badge}`}>{fqWord.cat}</span>
        </div>
        <QuestionCardType key={`fq-${fqWord.id}-${fq.idx}`} word={fqWord}
          onCorrect={fqCorrect}
          onWrong={fqWrong}
          advance={fqAdvance} />
      </div>
    );
  }

  if (queue.length === 0 || !current) {
    const allDone = VOCAB.filter(w => cats.has(w.cat)).every(w => (ws[w.id]?.level ?? 0) >= 3);
    return (
      <div className="flex-1 flex items-center justify-center p-4">
        <div className="text-center anim-scale-in max-w-md">
          <div className="text-7xl mb-4">{allDone ? "🎓" : "📚"}</div>
          <h2 className="text-2xl font-black text-white mb-2">{allDone ? "All Words Mastered!" : "No Words to Study"}</h2>
          <p className="text-white/40 text-sm mb-3">
            {allDone ? `You've mastered all ${sideStats.total} words. Ready for the final quiz?` : "Select categories on the Home page to begin."}
          </p>
          {(sessionCorrect > 0 || sessionWrong > 0) && (
            <div className="flex justify-center gap-4 mb-5">
              <span className="text-emerald-400 text-sm font-bold">{sessionCorrect} correct</span>
              <span className="text-red-400 text-sm font-bold">{sessionWrong} missed</span>
            </div>
          )}
          <div className="flex justify-center gap-3 flex-wrap">
            {allDone && (
              <button onClick={startFinalQuiz}
                className="px-8 py-3 bg-uga-red text-white font-bold rounded-xl hover:bg-uga-red-dark transition shadow-lg shadow-uga-red/20">
                Start Final Quiz ({sideStats.total} words) →
              </button>
            )}
            <button onClick={() => setView("home")} className="px-6 py-3 bg-white/[.08] border border-white/[.12] text-white font-bold rounded-xl hover:bg-white/[.14] transition">&larr; Home</button>
          </div>
        </div>
      </div>
    );
  }

  const catStyle = CAT_STYLES[current.cat] || CAT_STYLES["Society"];

  return (
    <div className="flex-1 flex flex-col lg:flex-row max-w-6xl mx-auto w-full">
      {/* Desktop Sidebar */}
      <aside className="hidden lg:flex flex-col w-64 shrink-0 border-r border-white/[.06] p-5 gap-5">
        <div>
          <p className="text-[10px] uppercase tracking-widest text-white/30 font-bold mb-3">Progress</p>
          <SideBar label="Not Started" n={sideStats.ns} total={sideStats.total} barCls="bg-white/20" txtCls="text-white/40" />
          <SideBar label="Learning"    n={sideStats.lr} total={sideStats.total} barCls="bg-amber-500"   txtCls="text-amber-400" />
          <SideBar label="Mastered"    n={sideStats.ma} total={sideStats.total} barCls="bg-emerald-500" txtCls="text-emerald-400" />
        </div>
        <div className="border-t border-white/[.06] pt-4">
          <p className="text-[10px] uppercase tracking-widest text-white/30 font-bold mb-2">This Session</p>
          <div className="flex gap-3 text-xs">
            <span className="text-emerald-400 font-bold">{sessionCorrect} ✓</span>
            <span className="text-red-400 font-bold">{sessionWrong} ✗</span>
          </div>
          <p className="text-[10px] text-white/20 mt-1">Round {round}</p>
        </div>
        <button onClick={() => setView("home")} className="mt-auto text-xs text-white/25 hover:text-white/50 transition text-left">&larr; Back to Home</button>
      </aside>

      {/* Main */}
      <div className="flex-1 flex flex-col items-center justify-center p-4 sm:p-8">
        {/* Mobile top bar */}
        <div className="w-full max-w-xl mb-4 flex items-center justify-between lg:hidden">
          <button onClick={() => setView("home")} className="text-xs text-white/30 hover:text-white/50">&larr; Back</button>
          <div className="flex gap-3 text-[11px]">
            <span className="text-emerald-400 font-bold">{sessionCorrect} ✓</span>
            <span className="text-red-400 font-bold">{sessionWrong} ✗</span>
          </div>
        </div>

        {/* Progress ribbon */}
        <div className="w-full max-w-xl mb-1 flex items-center gap-3">
          <div className="flex-1 h-1.5 rounded-full bg-white/[.06] overflow-hidden">
            <div className="h-full rounded-full bg-uga-red bar-fill" style={{ width: `${(idx + 1) / queue.length * 100}%` }} />
          </div>
          <span className="text-[10px] text-white/25 font-mono shrink-0">{idx + 1}/{queue.length}</span>
        </div>

        {/* Badges */}
        <div className="mb-5 flex items-center gap-2 flex-wrap justify-center">
          <span className={`text-[10px] font-bold px-2.5 py-0.5 rounded-full border ${
            currentLevel === 0 ? "bg-blue-900/40 text-blue-300 border-blue-700/40" : "bg-amber-900/40 text-amber-300 border-amber-700/40"
          }`}>
            {currentLevel === 0 ? "Level 0 · Multiple Choice" : "Level 1 · Type the Answer"}
          </span>
          <span className={`text-[10px] px-2 py-0.5 rounded-full border ${catStyle.badge}`}>{current.cat}</span>
        </div>

        {/* Question Card */}
        {currentLevel === 0 ? (
          <QuestionCardMC key={`mc-${current.id}-${idx}`} word={current}
            onCorrect={() => handleCorrect(current.id)}
            onWrong={() => handleWrong(current.id)}
            advance={advance} />
        ) : (
          <QuestionCardType key={`type-${current.id}-${idx}`} word={current}
            onCorrect={() => handleCorrect(current.id)}
            onWrong={() => handleWrong(current.id)}
            advance={advance} />
        )}

        {/* Mobile mini bars */}
        <div className="w-full max-w-xl mt-8 grid grid-cols-3 gap-2 lg:hidden">
          <MiniBar label="New" n={sideStats.ns} total={sideStats.total} barCls="bg-white/20" />
          <MiniBar label="Learning" n={sideStats.lr} total={sideStats.total} barCls="bg-amber-500" />
          <MiniBar label="Mastered" n={sideStats.ma} total={sideStats.total} barCls="bg-emerald-500" />
        </div>
      </div>
    </div>
  );
}

function SideBar({ label, n, total, barCls, txtCls }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between items-baseline mb-1">
        <span className="text-[11px] font-semibold text-white/50">{label}</span>
        <span className={`text-xs font-black ${txtCls}`}>{n}</span>
      </div>
      <div className="h-2 rounded-full bg-white/[.05] overflow-hidden">
        <div className={`h-full rounded-full ${barCls} bar-fill`} style={{ width: `${total ? n / total * 100 : 0}%` }} />
      </div>
    </div>
  );
}

function MiniBar({ label, n, total, barCls }) {
  return (
    <div className="rounded-lg bg-white/[.03] border border-white/[.06] p-2 text-center">
      <div className="text-xs font-black text-white/60">{n}</div>
      <div className="text-[9px] text-white/25">{label}</div>
      <div className="h-1 rounded-full bg-white/[.04] mt-1 overflow-hidden">
        <div className={`h-full ${barCls} bar-fill rounded-full`} style={{ width: `${total ? n / total * 100 : 0}%` }} />
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   ███  QUESTION CARD — Multiple Choice  (Level 0)  ███
   Shows SPANISH term → user picks correct ENGLISH meaning.
   ══════════════════════════════════════════════════════════════════ */
function QuestionCardMC({ word, onCorrect, onWrong, advance }) {
  const [options, setOptions] = useState([]);
  const [picked, setPicked] = useState(null);
  const [isCorrect, setIsCorrect] = useState(null);
  const [highlighted, setHighlighted] = useState(null); // keyboard-focused index

  useEffect(() => {
    // Prefer distractors from the same category; fall back to other categories if needed
    const sameCat  = shuffle(VOCAB.filter(w => w.id !== word.id && w.cat === word.cat));
    const otherCat = shuffle(VOCAB.filter(w => w.id !== word.id && w.cat !== word.cat));
    const distPool = [...sameCat, ...otherCat]; // same-cat first, then fill from others
    const distractors = distPool.slice(0, 3).map(w => w.definition);
    setOptions(shuffle([word.definition, ...distractors]));
    setPicked(null);
    setIsCorrect(null);
    setHighlighted(null);
  }, [word.id]);

  useEffect(() => {
    const handler = (e) => {
      // After answering, Enter advances
      if (isCorrect !== null) {
        if (e.key === "Enter") { e.preventDefault(); advance(); }
        return;
      }
      // Letter keys A-D highlight the option
      const letterIdx = ["a","b","c","d"].indexOf(e.key.toLowerCase());
      if (letterIdx !== -1 && letterIdx < options.length) {
        e.preventDefault();
        setHighlighted(letterIdx);
        return;
      }
      // Arrow keys navigate
      if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        e.preventDefault();
        setHighlighted(prev => {
          const base = prev === null ? -1 : prev;
          const next = e.key === "ArrowDown"
            ? (base + 1) % options.length
            : (base - 1 + options.length) % options.length;
          return next;
        });
        return;
      }
      // Enter confirms highlighted option
      if (e.key === "Enter" && highlighted !== null) {
        e.preventDefault();
        pick(options[highlighted]);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [isCorrect, options, highlighted, picked, advance]);

  const pick = (opt) => {
    if (picked !== null) return;
    setPicked(opt);
    if (opt === word.definition) { setIsCorrect(true); onCorrect(); }
    else { setIsCorrect(false); onWrong(); }
  };

  return (
    <div className="w-full max-w-xl anim-scale-in">
      <div className="text-center mb-8">
        <p className="text-xs text-white/30 mb-2 font-medium">What does this mean?</p>
        <h2 className="text-3xl sm:text-4xl font-black text-white leading-tight">{word.term}</h2>
      </div>
      <div className="grid gap-3">
        {options.map((opt, i) => {
          let cls = "bg-white/[.04] border-white/[.08] text-white/80 hover:bg-white/[.07] hover:border-white/[.15] cursor-pointer";
          if (picked !== null) {
            if (opt === word.definition) cls = "bg-emerald-500/15 border-emerald-500/60 text-emerald-300";
            else if (opt === picked) cls = "bg-red-500/15 border-red-500/60 text-red-300 anim-shake";
            else cls = "bg-white/[.02] border-white/[.04] text-white/15";
          } else if (highlighted === i) {
            cls = "bg-white/[.10] border-white/40 text-white cursor-pointer";
          }
          return (
            <button key={i} onClick={() => pick(opt)} disabled={picked !== null}
              className={`w-full text-left px-5 py-4 rounded-xl border-2 font-medium text-sm transition-all disabled:cursor-default ${cls}`}>
              <span className={`font-bold mr-3 text-xs ${highlighted === i && picked === null ? "text-white/60" : "text-white/20"}`}>{String.fromCharCode(65 + i)}</span>{opt}
            </button>
          );
        })}
      </div>
      {picked === null && (
        <p className="text-center text-[10px] text-white/15 mt-4">A–D to highlight &middot; ↑↓ arrows to navigate &middot; Enter to confirm</p>
      )}
      {isCorrect !== null && (
        <div className="mt-5 anim-fade-up text-center">
          <div className={`text-sm font-bold mb-4 ${isCorrect ? "text-emerald-400" : "text-red-400"}`}>
            {isCorrect ? "✓ Correct! Advancing to Level 1." : `✗ Incorrect — the answer was "${word.definition}"`}
          </div>
          <button onClick={advance}
            className="px-8 py-3 bg-white/[.08] hover:bg-white/[.14] border border-white/[.12] text-white font-bold text-sm rounded-xl transition-all">
            Continue &rarr;
          </button>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   ███  QUESTION CARD — Type the Answer  (Level 1 → 3)  ███
   Shows ENGLISH definition → user types SPANISH term.
   Features: accent detection, correction mode, accent shortcut bar.
   ══════════════════════════════════════════════════════════════════ */
function QuestionCardType({ word, onCorrect, onWrong, advance }) {
  const inputRef = useRef(null);
  const [input, setInput] = useState("");
  const [phase, setPhase] = useState("answer");
  const [shaking, setShaking] = useState(false);

  useEffect(() => {
    setInput("");
    setPhase("answer");
    setShaking(false);
    setTimeout(() => inputRef.current?.focus(), 120);
  }, [word.id]);

  useEffect(() => {
    if (phase !== "correct" && phase !== "correctionDone") return;
    const handler = (e) => { if (e.key === "Enter") advance(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [phase, advance]);

  const correctAnswer = word.term;

  const checkAnswer = (val) => {
    const trimmed = val.trim();
    if (trimmed.toLowerCase() === correctAnswer.toLowerCase()) return "correct";
    if (diffIsAccentsOnly(trimmed, correctAnswer)) return "accentWarn";
    return "wrong";
  };

  /* Insert accent at cursor position */
  const insertChar = (ch) => {
    const el = inputRef.current;
    if (!el) { setInput(p => p + ch); return; }
    const start = el.selectionStart ?? input.length;
    const end = el.selectionEnd ?? input.length;
    const newVal = input.slice(0, start) + ch + input.slice(end);
    setInput(newVal);
    // Restore cursor after React re-render
    setTimeout(() => {
      el.focus();
      el.setSelectionRange(start + ch.length, start + ch.length);
    }, 0);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!input.trim()) return;

    if (phase === "correction") {
      const res = checkAnswer(input);
      if (res === "correct" || res === "accentWarn") {
        setPhase("correctionDone");
      } else {
        setShaking(true);
        setTimeout(() => setShaking(false), 500);
        setInput("");
      }
      return;
    }

    if (phase === "accentWarn") {
      const res = checkAnswer(input);
      if (res === "correct") {
        setPhase("correct");
        onCorrect();
      } else {
        setPhase("wrong");
        onWrong();
      }
      return;
    }

    const result = checkAnswer(input);
    if (result === "correct") {
      setPhase("correct");
      onCorrect();
    } else if (result === "accentWarn") {
      setPhase("accentWarn");
      setInput("");
      setTimeout(() => inputRef.current?.focus(), 100);
    } else {
      setPhase("wrong");
      onWrong();
    }
  };

  const hint = correctAnswer.split("").map((ch, i) =>
    i === 0 || ch === " " || "/()¡¿!".includes(ch) ? ch : "·"
  ).join("");

  const isLocked = phase === "correct" || phase === "correctionDone" || phase === "wrong";

  /* When wrong, show the answer then let user click to enter correction mode */
  const enterCorrection = () => {
    setPhase("correction");
    setInput("");
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const inputCls = (() => {
    if (isLocked && phase === "correct") return "bg-emerald-900/20 border-emerald-500/50 text-emerald-300";
    if (isLocked) return "bg-white/[.03] border-white/[.08] text-white/40";
    if (phase === "correction") return "bg-red-900/10 border-red-800/40 text-white focus:border-red-500/60";
    if (phase === "accentWarn") return "bg-amber-900/10 border-amber-700/40 text-white focus:border-amber-500/60";
    return "bg-white/[.04] border-white/[.08] text-white focus:border-uga-red/60";
  })();

  return (
    <div className={`w-full max-w-xl anim-scale-in ${shaking ? "anim-shake" : ""}`}>
      <div className="text-center mb-6">
        <p className="text-xs text-white/30 mb-2 font-medium">Type the Spanish term for:</p>
        <h2 className="text-2xl sm:text-3xl font-black text-white mb-2 leading-tight">{word.definition}</h2>
        <p className="text-xs text-white/15 font-mono tracking-[.2em]">{hint}</p>
      </div>

      {phase === "accentWarn" && (
        <div className="mb-4 px-4 py-3 rounded-xl bg-amber-900/30 border border-amber-700/40 anim-fade-up">
          <p className="text-amber-300 text-sm font-bold mb-0.5">⚠ Almost! Check your accents.</p>
          <p className="text-amber-200/60 text-xs">Your answer is close but missing accented characters. Use the buttons below and try once more.</p>
        </div>
      )}

      {(phase === "wrong" || phase === "correction") && (
        <div className="mb-4 px-4 py-3 rounded-xl bg-red-900/20 border border-red-800/40 anim-fade-up">
          <p className="text-red-400 text-sm font-bold mb-1">✗ Incorrect. The correct answer is:</p>
          <p className="text-red-300 text-xl font-black tracking-wide my-1">{correctAnswer}</p>
          {phase === "correction" && <p className="text-red-300/50 text-xs mt-1">Now type it correctly below to continue.</p>}
        </div>
      )}

      {phase === "correct" && (
        <div className="mb-4 px-4 py-3 rounded-xl bg-emerald-900/20 border border-emerald-700/40 anim-fade-up">
          <p className="text-emerald-400 text-sm font-bold">✓ Mastered! Excellent recall.</p>
        </div>
      )}
      {phase === "correctionDone" && (
        <div className="mb-4 px-4 py-3 rounded-xl bg-white/[.04] border border-white/[.08] anim-fade-up">
          <p className="text-white/50 text-sm font-semibold">Got it. This word returns to Multiple Choice.</p>
        </div>
      )}

      {/* Continue buttons for terminal phases */}
      {phase === "correct" && (
        <button onClick={advance}
          className="w-full mb-4 py-3.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-sm transition-all">
          Continue &rarr;
        </button>
      )}
      {phase === "correctionDone" && (
        <button onClick={advance}
          className="w-full mb-4 py-3.5 rounded-xl bg-white/[.08] hover:bg-white/[.14] border border-white/[.12] text-white font-bold text-sm transition-all">
          Continue &rarr;
        </button>
      )}
      {phase === "wrong" && (
        <button onClick={enterCorrection}
          className="w-full mb-4 py-3.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold text-sm transition-all">
          Type the Correct Answer &rarr;
        </button>
      )}

      <form onSubmit={handleSubmit}>
        <input ref={inputRef} type="text" value={input} onChange={e => setInput(e.target.value)}
          disabled={isLocked}
          placeholder={phase === "correction" ? "Re-type the correct answer..." : "Type your answer..."}
          autoComplete="off" autoCapitalize="off" spellCheck="false"
          className={`w-full px-5 py-4 rounded-xl text-center text-lg font-semibold outline-none transition-all border-2 ${inputCls}`} />

        {/* Accent Shortcut Bar */}
        {!isLocked && (
          <div className="mt-3 flex flex-wrap justify-center gap-1.5">
            {["á","é","í","ó","ú","ñ","ü","¿","¡"].map(ch => (
              <button key={ch} type="button" onClick={() => insertChar(ch)}
                className="w-11 h-11 sm:w-10 sm:h-10 rounded-lg bg-white/[.06] border border-white/[.08] text-white font-bold text-base sm:text-sm hover:bg-white/[.12] hover:border-white/[.15] transition-all active:scale-90 select-none touch-manipulation">
                {ch}
              </button>
            ))}
          </div>
        )}

        {!isLocked && (
          <button type="submit" disabled={!input.trim()}
            className={`w-full mt-4 py-3.5 rounded-xl font-bold text-sm transition-all disabled:opacity-20 disabled:cursor-not-allowed ${
              phase === "correction" ? "bg-red-600 hover:bg-red-500 text-white" : "bg-uga-red hover:bg-uga-red-dark text-white"
            }`}>
            {phase === "correction" ? "Submit Correction" : "Check Answer"}
          </button>
        )}
      </form>
    </div>
  );
}

/* ═══════════════════════ BROWSE PAGE ═══════════════════════ */
function BrowsePage({ cats, toggle, setCats, ws }) {
  const [search, setSearch] = useState("");
  const [openCat, setOpenCat] = useState(null);

  const filtered = VOCAB.filter(w => {
    if (!cats.has(w.cat)) return false;
    if (search) {
      const q = search.toLowerCase();
      return w.term.toLowerCase().includes(q) || w.definition.toLowerCase().includes(q);
    }
    return true;
  });

  const grouped = {};
  filtered.forEach(w => { (grouped[w.cat] = grouped[w.cat] || []).push(w); });

  const lvlBadge = (l) => {
    if (l === 0) return ["New", "text-white/25 bg-white/[.04]"];
    if (l === 1) return ["Learning", "text-amber-400 bg-amber-900/25"];
    return ["Mastered", "text-emerald-400 bg-emerald-900/25"];
  };

  return (
    <div className="flex-1 max-w-5xl mx-auto w-full px-4 py-8 space-y-5 anim-fade-up">
      <h2 className="text-xl font-black text-white">Browse All Words</h2>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search terms or definitions..."
        className="w-full px-4 py-3 rounded-xl bg-white/[.04] border border-white/[.06] text-white text-sm outline-none focus:border-uga-red/50 transition" />
      <div className="flex flex-wrap gap-1.5">
        <button onClick={() => setCats(new Set(CATEGORIES))} className="text-[10px] font-bold text-uga-red px-2 py-0.5 rounded-md hover:bg-uga-red/10">All</button>
        <button onClick={() => setCats(new Set())} className="text-[10px] font-bold text-white/25 px-2 py-0.5 rounded-md hover:bg-white/5">None</button>
        {CATEGORIES.map(c => {
          const s = CAT_STYLES[c]; const on = cats.has(c);
          return (
            <button key={c} onClick={() => toggle(c)}
              className={`px-2 py-0.5 rounded-md text-[10px] font-semibold border transition ${on ? s.chip : s.chipOff}`}>{c}</button>
          );
        })}
      </div>
      <p className="text-[11px] text-white/30">{filtered.length} words</p>
      <div className="space-y-2.5">
        {Object.entries(grouped).map(([cat, words]) => {
          const s = CAT_STYLES[cat]; const isOpen = openCat === cat;
          return (
            <div key={cat} className={`rounded-xl border overflow-hidden ${s.group}`}>
              <button onClick={() => setOpenCat(isOpen ? null : cat)} className="w-full px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className={`w-2 h-2 rounded-full ${s.groupDot}`} />
                  <span className={`text-sm font-bold ${s.groupTxt}`}>{cat}</span>
                  <span className="text-[10px] text-white/25">({words.length})</span>
                </div>
                <span className={`text-[10px] transition-transform ${s.groupArr} ${isOpen ? "rotate-180" : ""}`}>▼</span>
              </button>
              {isOpen && (
                <div className="border-t border-white/[.04]">
                  {words.map(w => {
                    const [lbl, cls] = lvlBadge(ws[w.id]?.level ?? 0);
                    return (
                      <div key={w.id} className="px-4 py-2.5 flex items-center justify-between border-b border-white/[.03] last:border-0 hover:bg-white/[.02] transition">
                        <div className="flex-1 min-w-0 mr-3">
                          <div className="text-sm font-semibold text-white truncate">{w.term}</div>
                          <div className="text-xs text-white/35 truncate">{w.definition}</div>
                        </div>
                        <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap ${cls}`}>{lbl}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
