    // ═══════════════════════════════════════════════════════════════
    // STORAGE HELPERS
    // ═══════════════════════════════════════════════════════════════
    const STORAGE_KEY = "uga_spanish_2001_progress";

    function loadProgress() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (data && data.version === 2) return data;
      } catch (e) {}
      return null;
    }

    function saveProgress(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, version: 2 }));
    }

    function getDefaultWordState() {
      return {
        mastery_level: 0,    // 0=new, 1=learning, 2=familiar, 3=mastered
        phase: 1,            // 1=MC, 2=Flashcard, 3=Written
        mcCorrectStreak: 0,  // need 2 correct to advance from Phase 1
        fcCorrectCount: 0,   // need 2 correct to advance from Phase 2
        leitnerBox: 0,       // 0-4 for spaced repetition
        lastSeen: 0,
        wrongCount: 0,
      };
    }

    // ═══════════════════════════════════════════════════════════════
    // SHUFFLE UTILITY
    // ═══════════════════════════════════════════════════════════════
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ═══════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════
    function App() {
      const [view, setView] = useState("home"); // home | learn | browse
      const [selectedCategories, setSelectedCategories] = useState(new Set(CATEGORIES));
      const [wordStates, setWordStates] = useState(() => {
        const saved = loadProgress();
        if (saved && saved.wordStates) return saved.wordStates;
        const init = {};
        VOCABULARY_DATA.forEach(w => { init[w.id] = getDefaultWordState(); });
        return init;
      });

      // Persist to localStorage on every change
      useEffect(() => {
        saveProgress({ wordStates });
      }, [wordStates]);

      const updateWordState = useCallback((id, updates) => {
        setWordStates(prev => ({
          ...prev,
          [id]: { ...prev[id], ...updates }
        }));
      }, []);

      const resetProgress = useCallback(() => {
        const init = {};
        VOCABULARY_DATA.forEach(w => { init[w.id] = getDefaultWordState(); });
        setWordStates(init);
      }, []);

      const stats = useMemo(() => {
        let newW = 0, learning = 0, mastered = 0;
        VOCABULARY_DATA.forEach(w => {
          if (!selectedCategories.has(w.category)) return;
          const s = wordStates[w.id];
          if (!s || s.mastery_level === 0) newW++;
          else if (s.mastery_level < 3) learning++;
          else mastered++;
        });
        const total = newW + learning + mastered;
        return { newW, learning, mastered, total };
      }, [wordStates, selectedCategories]);

      const toggleCategory = (cat) => {
        setSelectedCategories(prev => {
          const next = new Set(prev);
          if (next.has(cat)) next.delete(cat);
          else next.add(cat);
          return next;
        });
      };

      const selectAllCategories = () => setSelectedCategories(new Set(CATEGORIES));
      const deselectAllCategories = () => setSelectedCategories(new Set());

      return (
        <div className="min-h-screen bg-[#0a0a0a]">
          {/* ── NAV BAR ── */}
          <nav className="sticky top-0 z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-white/10">
            <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg bg-uga-red flex items-center justify-center font-black text-white text-sm">
                  UGA
                </div>
                <div>
                  <h1 className="text-sm font-bold text-white leading-none">Spanish 2001</h1>
                  <p className="text-[10px] text-white/40 leading-none mt-0.5">Midterm Vocabulary</p>
                </div>
              </div>
              <div className="flex gap-1">
                {[
                  { id: "home", icon: Icons.Home, label: "Home" },
                  { id: "learn", icon: Icons.Learn, label: "Learn" },
                  { id: "browse", icon: Icons.Filter, label: "Browse" },
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setView(tab.id)}
                    className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium transition-all
                      ${view === tab.id
                        ? "bg-uga-red text-white shadow-lg shadow-uga-red/25"
                        : "text-white/50 hover:text-white hover:bg-white/5"
                      }`}
                  >
                    <tab.icon />{tab.label}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* ── CONTENT ── */}
          <main className="max-w-5xl mx-auto px-4 py-6">
            {view === "home" && (
              <HomeView
                stats={stats}
                wordStates={wordStates}
                selectedCategories={selectedCategories}
                toggleCategory={toggleCategory}
                selectAll={selectAllCategories}
                deselectAll={deselectAllCategories}
                onStart={() => setView("learn")}
                onReset={resetProgress}
              />
            )}
            {view === "learn" && (
              <LearnView
                selectedCategories={selectedCategories}
                wordStates={wordStates}
                updateWordState={updateWordState}
                onBack={() => setView("home")}
              />
            )}
            {view === "browse" && (
              <BrowseView
                wordStates={wordStates}
                selectedCategories={selectedCategories}
                toggleCategory={toggleCategory}
                selectAll={selectAllCategories}
                deselectAll={deselectAllCategories}
              />
            )}
          </main>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // LEARN VIEW — Adaptive SRS with 3 Phases
    // ═══════════════════════════════════════════════════════════════
    function LearnView({ selectedCategories, wordStates, updateWordState, onBack }) {
      const [queue, setQueue] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [feedback, setFeedback] = useState(null); // { correct: bool, message: string }
      const [sessionStats, setSessionStats] = useState({ correct: 0, incorrect: 0, seen: 0 });
      const [sessionComplete, setSessionComplete] = useState(false);

      // Build study queue using Leitner system
      const buildQueue = useCallback(() => {
        const eligible = VOCABULARY_DATA.filter(w => selectedCategories.has(w.category));
        if (eligible.length === 0) return [];

        // Sort by Leitner box (lower first), then by wrong count (higher first), then randomize within same priority
        const sorted = eligible.map(w => ({
          ...w,
          state: wordStates[w.id] || getDefaultWordState()
        }));

        // Separate into priority groups
        const unmastered = sorted.filter(w => w.state.mastery_level < 3);
        const mastered = sorted.filter(w => w.state.mastery_level >= 3);

        // For unmastered: sort by box (lower = more urgent), then by wrong count
        unmastered.sort((a, b) => {
          if (a.state.leitnerBox !== b.state.leitnerBox) return a.state.leitnerBox - b.state.leitnerBox;
          if (a.state.wrongCount !== b.state.wrongCount) return b.state.wrongCount - a.state.wrongCount;
          return Math.random() - 0.5;
        });

        // Take at most 20 unmastered words per session, plus a few mastered ones for review
        const sessionWords = [
          ...unmastered.slice(0, 20),
          ...shuffle(mastered).slice(0, 5)
        ];

        return shuffle(sessionWords);
      }, [selectedCategories, wordStates]);

      useEffect(() => {
        const q = buildQueue();
        setQueue(q);
        setCurrentIdx(0);
        setSessionStats({ correct: 0, incorrect: 0, seen: 0 });
        setSessionComplete(false);
        setFeedback(null);
      }, [selectedCategories]);

      const currentWord = queue[currentIdx];
      const currentState = currentWord ? (wordStates[currentWord.id] || getDefaultWordState()) : null;

      const advanceToNext = useCallback(() => {
        setFeedback(null);
        if (currentIdx + 1 >= queue.length) {
          setSessionComplete(true);
        } else {
          setCurrentIdx(prev => prev + 1);
        }
      }, [currentIdx, queue.length]);

      const handleCorrect = useCallback((wordId) => {
        const state = wordStates[wordId] || getDefaultWordState();
        const updates = { ...state, lastSeen: Date.now() };

        if (state.phase === 1) {
          updates.mcCorrectStreak = state.mcCorrectStreak + 1;
          if (updates.mcCorrectStreak >= 2) {
            updates.phase = 2;
            updates.mastery_level = Math.max(state.mastery_level, 1);
          }
        } else if (state.phase === 2) {
          updates.fcCorrectCount = state.fcCorrectCount + 1;
          if (updates.fcCorrectCount >= 2) {
            updates.phase = 3;
            updates.mastery_level = Math.max(state.mastery_level, 2);
          }
        } else if (state.phase === 3) {
          updates.mastery_level = 3;
          updates.leitnerBox = Math.min(state.leitnerBox + 1, 4);
        }

        updateWordState(wordId, updates);
        setSessionStats(prev => ({ ...prev, correct: prev.correct + 1, seen: prev.seen + 1 }));
        setFeedback({ correct: true, message: "Correct!" });
        setTimeout(advanceToNext, 800);
      }, [wordStates, updateWordState, advanceToNext]);

      const handleIncorrect = useCallback((wordId) => {
        const state = wordStates[wordId] || getDefaultWordState();
        const updates = {
          ...state,
          lastSeen: Date.now(),
          wrongCount: state.wrongCount + 1,
          leitnerBox: 0, // Reset to box 0 on wrong answer
          mcCorrectStreak: 0,
          fcCorrectCount: 0,
        };

        // Demote phase if they got it wrong
        if (state.phase > 1) {
          updates.phase = state.phase - 1;
          updates.mastery_level = Math.max(0, state.mastery_level - 1);
        } else {
          updates.mastery_level = 0;
        }

        updateWordState(wordId, updates);
        setSessionStats(prev => ({ ...prev, incorrect: prev.incorrect + 1, seen: prev.seen + 1 }));

        // Re-insert at a near-front position (Leitner: missed words return to front)
        setQueue(prev => {
          const newQ = [...prev];
          const word = newQ[currentIdx];
          // Insert 3-5 positions ahead
          const insertAt = Math.min(currentIdx + 3 + Math.floor(Math.random() * 3), newQ.length);
          newQ.splice(insertAt, 0, { ...word });
          return newQ;
        });
      }, [wordStates, updateWordState, currentIdx]);

      const restartSession = () => {
        const q = buildQueue();
        setQueue(q);
        setCurrentIdx(0);
        setSessionStats({ correct: 0, incorrect: 0, seen: 0 });
        setSessionComplete(false);
        setFeedback(null);
      };

      if (queue.length === 0) {
        return (
          <div className="animate-slide-in text-center py-20">
            <div className="text-6xl mb-4">📚</div>
            <h2 className="text-xl font-bold text-white mb-2">No words to study</h2>
            <p className="text-white/50 text-sm mb-6">Select at least one category from the Home screen.</p>
            <button onClick={onBack} className="px-6 py-2 bg-uga-red text-white font-bold rounded-xl">← Go Back</button>
          </div>
        );
      }

      if (sessionComplete) {
        return (
          <div className="animate-slide-in text-center py-16">
            <div className="text-6xl mb-4">🎉</div>
            <h2 className="text-2xl font-black text-white mb-2">Session Complete!</h2>
            <p className="text-white/50 text-sm mb-8">Great work on this round.</p>
            <div className="grid grid-cols-3 gap-3 max-w-sm mx-auto mb-8">
              <div className="rounded-xl bg-white/5 border border-white/10 p-4 text-center">
                <div className="text-2xl font-black text-white">{sessionStats.seen}</div>
                <div className="text-[10px] text-white/40">Reviewed</div>
              </div>
              <div className="rounded-xl bg-emerald-900/30 border border-emerald-800 p-4 text-center">
                <div className="text-2xl font-black text-emerald-400">{sessionStats.correct}</div>
                <div className="text-[10px] text-emerald-400/60">Correct</div>
              </div>
              <div className="rounded-xl bg-red-900/30 border border-red-800 p-4 text-center">
                <div className="text-2xl font-black text-red-400">{sessionStats.incorrect}</div>
                <div className="text-[10px] text-red-400/60">Missed</div>
              </div>
            </div>
            <div className="flex justify-center gap-3">
              <button onClick={restartSession} className="px-6 py-2.5 bg-uga-red text-white font-bold rounded-xl hover:bg-uga-red-dark transition-colors">
                Study Again
              </button>
              <button onClick={onBack} className="px-6 py-2.5 bg-white/10 text-white font-bold rounded-xl hover:bg-white/15 transition-colors">
                ← Home
              </button>
            </div>
          </div>
        );
      }

      const phaseLabels = { 1: "Multiple Choice", 2: "Flashcard", 3: "Written Recall" };
      const phaseColors = { 1: "text-blue-400", 2: "text-amber-400", 3: "text-emerald-400" };
      const phaseBgColors = { 1: "bg-blue-500", 2: "bg-amber-500", 3: "bg-emerald-500" };

      return (
        <div className="animate-slide-in">
          {/* Session header */}
          <div className="flex items-center justify-between mb-4">
            <button onClick={onBack} className="text-xs text-white/40 hover:text-white transition-colors">← Back</button>
            <div className="flex items-center gap-3">
              <span className={`text-xs font-semibold ${phaseColors[currentState?.phase || 1]}`}>
                Phase {currentState?.phase || 1}: {phaseLabels[currentState?.phase || 1]}
              </span>
              <span className="text-xs text-white/30">{currentIdx + 1}/{queue.length}</span>
            </div>
          </div>

          {/* Progress bar for session */}
          <div className="h-1.5 bg-white/5 rounded-full overflow-hidden mb-6">
            <div
              className={`h-full rounded-full ${phaseBgColors[currentState?.phase || 1]} progress-bar-fill`}
              style={{ width: `${((currentIdx + 1) / queue.length) * 100}%` }}
            />
          </div>

          {/* Category badge */}
          {currentWord && (
            <div className="flex justify-center mb-4">
              <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${(CATEGORY_COLORS[currentWord.category] || CATEGORY_COLORS["Society"]).bg} ${(CATEGORY_COLORS[currentWord.category] || CATEGORY_COLORS["Society"]).text} border ${(CATEGORY_COLORS[currentWord.category] || CATEGORY_COLORS["Society"]).border}`}>
                {currentWord.category}
              </span>
            </div>
          )}

          {/* Phase-specific content */}
          {currentState?.phase === 1 && (
            <MultipleChoicePhase
              word={currentWord}
              onCorrect={() => handleCorrect(currentWord.id)}
              onIncorrect={() => handleIncorrect(currentWord.id)}
              feedback={feedback}
              setFeedback={setFeedback}
              advanceToNext={advanceToNext}
              selectedCategories={selectedCategories}
            />
          )}
          {currentState?.phase === 2 && (
            <FlashcardPhase
              word={currentWord}
              onCorrect={() => handleCorrect(currentWord.id)}
              onIncorrect={() => handleIncorrect(currentWord.id)}
              feedback={feedback}
            />
          )}
          {currentState?.phase === 3 && (
            <WrittenRecallPhase
              word={currentWord}
              onCorrect={() => handleCorrect(currentWord.id)}
              onIncorrect={() => handleIncorrect(currentWord.id)}
              feedback={feedback}
              setFeedback={setFeedback}
              advanceToNext={advanceToNext}
            />
          )}

          {/* Mastery indicator */}
          {currentState && (
            <div className="flex justify-center mt-6 gap-1">
              {[0, 1, 2, 3].map(level => (
                <div
                  key={level}
                  className={`w-2 h-2 rounded-full transition-colors ${
                    currentState.mastery_level >= level
                      ? level === 3 ? "bg-emerald-400" : level >= 1 ? "bg-amber-400" : "bg-white/40"
                      : "bg-white/10"
                  }`}
                />
              ))}
              <span className="text-[10px] text-white/30 ml-2">
                Mastery {currentState.mastery_level}/3
              </span>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PHASE 1: Multiple Choice
    // ═══════════════════════════════════════════════════════════════
    function MultipleChoicePhase({ word, onCorrect, onIncorrect, feedback, setFeedback, advanceToNext, selectedCategories }) {
      const [options, setOptions] = useState([]);
      const [selected, setSelected] = useState(null);

      useEffect(() => {
        // Generate 4 options including the correct answer
        const eligible = VOCABULARY_DATA.filter(w => w.id !== word.id && selectedCategories.has(w.category));
        const distractors = shuffle(eligible).slice(0, 3).map(w => w.definition);
        const opts = shuffle([word.definition, ...distractors]);
        setOptions(opts);
        setSelected(null);
      }, [word.id]);

      const handleSelect = (opt) => {
        if (selected !== null) return;
        setSelected(opt);
        if (opt === word.definition) {
          onCorrect();
        } else {
          setFeedback({ correct: false, message: `The answer is: ${word.definition}` });
          onIncorrect();
          setTimeout(advanceToNext, 2000);
        }
      };

      return (
        <div className="animate-slide-in max-w-lg mx-auto">
          <div className="text-center mb-8">
            <p className="text-xs text-white/40 mb-2">What does this mean?</p>
            <h2 className="text-3xl font-black text-white">{word.term}</h2>
          </div>

          <div className="space-y-3">
            {options.map((opt, i) => {
              let btnClass = "bg-white/5 border-white/10 text-white hover:bg-white/10 hover:border-white/20";
              if (selected !== null) {
                if (opt === word.definition) {
                  btnClass = "bg-emerald-900/40 border-emerald-500 text-emerald-300";
                } else if (opt === selected) {
                  btnClass = "bg-red-900/40 border-red-500 text-red-300";
                } else {
                  btnClass = "bg-white/5 border-white/5 text-white/20";
                }
              }
              return (
                <button
                  key={i}
                  onClick={() => handleSelect(opt)}
                  disabled={selected !== null}
                  className={`w-full text-left px-5 py-4 rounded-xl border-2 transition-all font-medium text-sm ${btnClass}`}
                >
                  <span className="text-white/30 mr-3 font-bold">{String.fromCharCode(65 + i)}</span>
                  {opt}
                </button>
              );
            })}
          </div>

          {feedback && (
            <div className={`mt-4 text-center text-sm font-semibold animate-slide-in ${feedback.correct ? "text-emerald-400" : "text-red-400"}`}>
              {feedback.message}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PHASE 2: Self-Assessment Flashcard
    // ═══════════════════════════════════════════════════════════════
    function FlashcardPhase({ word, onCorrect, onIncorrect, feedback }) {
      const [flipped, setFlipped] = useState(false);
      const [answered, setAnswered] = useState(false);

      useEffect(() => {
        setFlipped(false);
        setAnswered(false);
      }, [word.id]);

      const handleKnew = () => {
        if (answered) return;
        setAnswered(true);
        onCorrect();
      };

      const handleDidntKnow = () => {
        if (answered) return;
        setAnswered(true);
        onIncorrect();
      };

      return (
        <div className="animate-slide-in max-w-lg mx-auto">
          <p className="text-center text-xs text-white/40 mb-4">Think of the meaning, then flip to check</p>

          {/* Flashcard */}
          <div className="card-flip h-56 cursor-pointer mb-6" onClick={() => setFlipped(!flipped)}>
            <div className={`card-flip-inner w-full h-full ${flipped ? "flipped" : ""}`}>
              {/* Front */}
              <div className="card-face w-full h-full rounded-2xl bg-gradient-to-br from-white/10 to-white/5 border border-white/10 flex flex-col items-center justify-center p-6">
                <p className="text-xs text-white/40 mb-3">Spanish</p>
                <h2 className="text-3xl font-black text-white text-center">{word.term}</h2>
                <p className="text-xs text-white/20 mt-4 flex items-center gap-1"><Icons.Flip /> Tap to flip</p>
              </div>
              {/* Back */}
              <div className="card-face card-back w-full h-full rounded-2xl bg-gradient-to-br from-uga-red/20 to-uga-red-dark/20 border border-uga-red/30 flex flex-col items-center justify-center p-6">
                <p className="text-xs text-uga-red/60 mb-3">English</p>
                <h2 className="text-2xl font-black text-white text-center">{word.definition}</h2>
              </div>
            </div>
          </div>

          {/* Self-Assessment Buttons (only show after flip) */}
          {flipped && !answered && (
            <div className="flex gap-3 justify-center animate-slide-in">
              <button
                onClick={handleDidntKnow}
                className="flex items-center gap-2 px-6 py-3 bg-red-900/30 border border-red-800 text-red-300 font-bold rounded-xl hover:bg-red-900/50 transition-colors"
              >
                <Icons.X /> Didn't Know
              </button>
              <button
                onClick={handleKnew}
                className="flex items-center gap-2 px-6 py-3 bg-emerald-900/30 border border-emerald-800 text-emerald-300 font-bold rounded-xl hover:bg-emerald-900/50 transition-colors"
              >
                <Icons.Check /> Knew It
              </button>
            </div>
          )}

          {feedback && (
            <div className={`mt-4 text-center text-sm font-semibold animate-slide-in ${feedback.correct ? "text-emerald-400" : "text-red-400"}`}>
              {feedback.correct ? "Nice! Keep it up." : "No worries — we'll review it again soon."}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PHASE 3: Written Recall (accent-aware)
    // ═══════════════════════════════════════════════════════════════
    function WrittenRecallPhase({ word, onCorrect, onIncorrect, feedback, setFeedback, advanceToNext }) {
      const inputRef = useRef(null);
      const [input, setInput] = useState("");
      const [submitted, setSubmitted] = useState(false);

      useEffect(() => {
        setInput("");
        setSubmitted(false);
        // Focus input when word changes
        setTimeout(() => inputRef.current?.focus(), 100);
      }, [word.id]);

      const normalizeForComparison = (str) => {
        // Keep accents, but normalize casing
        return str.trim().toLowerCase();
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (submitted || !input.trim()) return;
        setSubmitted(true);

        const userAnswer = normalizeForComparison(input);
        const correctAnswer = normalizeForComparison(word.term);

        // Check if correct (ignore capitalization, check accents)
        if (userAnswer === correctAnswer) {
          onCorrect();
        } else {
          setFeedback({ correct: false, message: `Correct answer: ${word.term}` });
          onIncorrect();
          setTimeout(advanceToNext, 2500);
        }
      };

      // Build a hint: show first letter and underscores
      const hint = word.term.split("").map((ch, i) => {
        if (i === 0 || ch === " " || ch === "/" || ch === "(" || ch === ")") return ch;
        return "_";
      }).join("");

      return (
        <div className="animate-slide-in max-w-lg mx-auto">
          <div className="text-center mb-6">
            <p className="text-xs text-white/40 mb-2">Type the Spanish term for:</p>
            <h2 className="text-2xl font-black text-white mb-2">{word.definition}</h2>
            <p className="text-xs text-white/20 font-mono tracking-widest">{hint}</p>
          </div>

          <form onSubmit={handleSubmit}>
            <div className="relative">
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={e => setInput(e.target.value)}
                disabled={submitted}
                placeholder="Type your answer..."
                className={`w-full px-5 py-4 rounded-xl bg-white/5 border-2 text-white font-medium text-center text-lg outline-none transition-all
                  ${submitted
                    ? feedback?.correct
                      ? "border-emerald-500 bg-emerald-900/20"
                      : "border-red-500 bg-red-900/20"
                    : "border-white/10 focus:border-uga-red"
                  }`}
                autoComplete="off"
                autoCapitalize="off"
                spellCheck="false"
              />
            </div>

            {!submitted && (
              <button
                type="submit"
                disabled={!input.trim()}
                className="w-full mt-3 py-3 bg-uga-red text-white font-bold rounded-xl hover:bg-uga-red-dark transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
              >
                Check Answer
              </button>
            )}
          </form>

          {feedback && (
            <div className={`mt-4 text-center text-sm font-semibold animate-slide-in ${feedback.correct ? "text-emerald-400" : "text-red-400"}`}>
              {feedback.message}
            </div>
          )}

          {/* Accent helper keyboard */}
          {!submitted && (
            <div className="mt-4">
              <p className="text-[10px] text-white/30 text-center mb-2">Special characters:</p>
              <div className="flex flex-wrap justify-center gap-1.5">
                {["á", "é", "í", "ó", "ú", "ñ", "ü", "¡", "¿"].map(ch => (
                  <button
                    key={ch}
                    type="button"
                    onClick={() => {
                      setInput(prev => prev + ch);
                      inputRef.current?.focus();
                    }}
                    className="w-9 h-9 rounded-lg bg-white/10 border border-white/10 text-white font-bold text-sm hover:bg-white/20 transition-colors"
                  >
                    {ch}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // BROWSE VIEW
    // ═══════════════════════════════════════════════════════════════
    function BrowseView({ wordStates, selectedCategories, toggleCategory, selectAll, deselectAll }) {
      const [search, setSearch] = useState("");
      const [expandedCat, setExpandedCat] = useState(null);

      const filtered = VOCABULARY_DATA.filter(w => {
        if (!selectedCategories.has(w.category)) return false;
        if (search) {
          const q = search.toLowerCase();
          return w.term.toLowerCase().includes(q) || w.definition.toLowerCase().includes(q);
        }
        return true;
      });

      const grouped = {};
      filtered.forEach(w => {
        if (!grouped[w.category]) grouped[w.category] = [];
        grouped[w.category].push(w);
      });

      const masteryLabel = (level) => {
        if (level === 0) return { text: "New", cls: "text-white/30 bg-white/5" };
        if (level === 1) return { text: "Phase 1", cls: "text-blue-400 bg-blue-900/30" };
        if (level === 2) return { text: "Phase 2", cls: "text-amber-400 bg-amber-900/30" };
        return { text: "Mastered", cls: "text-emerald-400 bg-emerald-900/30" };
      };

      return (
        <div className="animate-slide-in space-y-4">
          <h2 className="text-xl font-black text-white">Browse Vocabulary</h2>

          {/* Search */}
          <input
            type="text"
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search terms or definitions..."
            className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm outline-none focus:border-uga-red transition-colors"
          />

          {/* Category filter chips */}
          <div className="flex flex-wrap gap-2">
            <button onClick={selectAll} className="text-[10px] text-uga-red font-semibold px-2 py-1 rounded-md hover:bg-uga-red/10">All</button>
            <button onClick={deselectAll} className="text-[10px] text-white/40 font-semibold px-2 py-1 rounded-md hover:bg-white/5">None</button>
            {CATEGORIES.map(cat => {
              const cc = CATEGORY_COLORS[cat] || CATEGORY_COLORS["Society"];
              const active = selectedCategories.has(cat);
              return (
                <button
                  key={cat}
                  onClick={() => toggleCategory(cat)}
                  className={`px-2.5 py-1 rounded-md text-[10px] font-medium transition-all border
                    ${active ? `${cc.bg} ${cc.border} ${cc.text}` : "bg-white/5 border-white/10 text-white/30"}`}
                >
                  {cat}
                </button>
              );
            })}
          </div>

          {/* Results count */}
          <p className="text-xs text-white/40">{filtered.length} words</p>

          {/* Grouped list */}
          <div className="space-y-3">
            {Object.entries(grouped).map(([cat, words]) => {
              const cc = CATEGORY_COLORS[cat] || CATEGORY_COLORS["Society"];
              const isExpanded = expandedCat === cat;
              return (
                <div key={cat} className={`rounded-xl border ${cc.border} ${cc.bg} overflow-hidden`}>
                  <button
                    onClick={() => setExpandedCat(isExpanded ? null : cat)}
                    className="w-full px-4 py-3 flex items-center justify-between"
                  >
                    <div className="flex items-center gap-2">
                      <span className={`w-2 h-2 rounded-full ${cc.dot}`} />
                      <span className={`text-sm font-bold ${cc.text}`}>{cat}</span>
                      <span className="text-xs text-white/30">({words.length})</span>
                    </div>
                    <span className={`text-xs ${cc.text} transition-transform ${isExpanded ? "rotate-180" : ""}`}>▼</span>
                  </button>
                  {isExpanded && (
                    <div className="border-t border-white/5">
                      {words.map(w => {
                        const state = wordStates[w.id] || getDefaultWordState();
                        const ml = masteryLabel(state.mastery_level);
                        return (
                          <div key={w.id} className="px-4 py-2.5 flex items-center justify-between border-b border-white/5 last:border-b-0 hover:bg-white/5 transition-colors">
                            <div className="flex-1 min-w-0">
                              <div className="text-sm font-semibold text-white truncate">{w.term}</div>
                              <div className="text-xs text-white/40 truncate">{w.definition}</div>
                            </div>
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${ml.cls} ml-2 whitespace-nowrap`}>
                              {ml.text}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
